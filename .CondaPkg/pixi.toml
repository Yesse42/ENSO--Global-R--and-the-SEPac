[dependencies]
openssl = ">=3, <3.6"
matplotlib = ">=1"
certifi = "*"
gsw = "*"
cartopy = "*"
objgraph = "*"
scikit-learn = "*"
uv = ">=0.4"
cmasher = "*"
psutil = "*"
numpy = "*"

    [dependencies.python]
    channel = "conda-forge"
    build = "*cp*"
